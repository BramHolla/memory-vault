<!DOCTYPE html>
<html lang="nl" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snapchat Herinneringen</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { snap: { yellow: '#FFFC00' } } } }
    }
  </script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dark h-full bg-gray-950 text-white flex flex-col overflow-hidden">

  <!-- ===== HEADER / FILTERS ===== -->
  <header class="flex-none bg-gray-900 border-b border-gray-800 px-4 py-3">
    <div class="flex flex-wrap items-center gap-3">

      <!-- Logo -->
      <div class="flex items-center gap-2 mr-2">
        <div class="w-8 h-8 rounded-full bg-snap-yellow flex items-center justify-center">
          <svg viewBox="0 0 24 24" class="w-5 h-5 fill-black">
            <path d="M12.166 3c-3.837 0-6.43 2.917-6.43 6.43 0 .604.07 1.186.186 1.742-.27.143-.553.22-.857.22-.44 0-.846-.174-1.15-.46l-.002-.001c-.13-.128-.32-.097-.417.065-.1.167-.053.387.107.493.523.346.87.927.87 1.59 0 .21-.034.412-.097.603-.27.816-.934 1.43-1.762 1.649-.193.05-.33.23-.304.428.026.198.2.342.4.342.017 0 .035 0 .053-.003.28-.04.56-.06.838-.06.56 0 1.05.107 1.45.317.77.41 1.21 1.19 1.37 2.32.025.187.187.325.375.325h.043c.228-.02.453-.03.67-.03.507 0 .99.07 1.437.207.64.196 1.246.583 1.76 1.12.434.46.827.682 1.266.682.44 0 .832-.222 1.267-.683.514-.537 1.12-.924 1.76-1.12.447-.137.93-.207 1.437-.207.217 0 .442.01.67.03h.043c.188 0 .35-.138.375-.325.16-1.13.6-1.91 1.37-2.32.4-.21.89-.317 1.45-.317.278 0 .558.02.838.06.018.003.036.003.053.003.2 0 .374-.144.4-.342.026-.198-.11-.378-.304-.428-.828-.22-1.493-.833-1.762-1.649-.063-.19-.097-.393-.097-.603 0-.663.347-1.244.87-1.59.16-.106.207-.326.107-.493-.097-.162-.287-.193-.417-.065l-.002.001c-.304.286-.71.46-1.15.46-.304 0-.587-.077-.857-.22.116-.556.186-1.138.186-1.742C18.596 5.917 16.003 3 12.166 3z"/>
          </svg>
        </div>
        <span class="font-bold text-snap-yellow text-lg hidden sm:block">Herinneringen</span>
      </div>

      <!-- Stats badge -->
      <div id="stats-badge" class="text-xs text-gray-400 hidden sm:block"></div>

      <div class="flex-1"></div>

      <!-- Media type filter -->
      <div class="flex rounded-lg overflow-hidden border border-gray-700 text-sm">
        <button onclick="setMediaType('')"   id="btn-all"   class="type-btn active px-3 py-1.5">Alles</button>
        <button onclick="setMediaType('image')"  id="btn-image" class="type-btn px-3 py-1.5">Foto's</button>
        <button onclick="setMediaType('video')"  id="btn-video" class="type-btn px-3 py-1.5">Video's</button>
      </div>

      <!-- Date from -->
      <input type="date" id="date-from" placeholder="Van"
        class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-snap-yellow text-white"
        onchange="applyFilters()">

      <!-- Date to -->
      <input type="date" id="date-to" placeholder="Tot"
        class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-snap-yellow text-white"
        onchange="applyFilters()">

      <!-- Clear filters -->
      <button onclick="clearFilters()"
        class="text-xs text-gray-400 hover:text-white px-2 py-1.5 rounded-lg hover:bg-gray-800 transition">
        Wis filters
      </button>

      <!-- Map toggle -->
      <button onclick="toggleMap()" id="map-toggle"
        class="bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg px-3 py-1.5 text-sm transition flex items-center gap-1.5">
        <svg viewBox="0 0 24 24" class="w-4 h-4 fill-current"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
        Kaart
      </button>

      <!-- User menu -->
      <div class="flex items-center gap-2 ml-1 border-l border-gray-700 pl-3">
        {% if current_user.is_admin %}
          <a href="/admin"
            class="text-xs text-gray-400 hover:text-snap-yellow px-2 py-1.5 rounded-lg hover:bg-gray-800 transition">
            Admin
          </a>
        {% endif %}
        <span class="text-xs text-gray-500 hidden sm:block">{{ current_user.id }}</span>
        <a href="/logout"
          class="text-xs text-gray-400 hover:text-white px-2 py-1.5 rounded-lg hover:bg-gray-800 transition">
          Uitloggen
        </a>
      </div>
    </div>

    <!-- Quick date filters + jaar dropdown -->
    <div class="flex gap-2 mt-2 flex-wrap items-center">
      <span class="text-xs text-gray-500">Snel:</span>
      <button onclick="setQuickDate('today')"     class="quick-btn">Vandaag</button>
      <button onclick="setQuickDate('week')"      class="quick-btn">Deze week</button>
      <button onclick="setQuickDate('month')"     class="quick-btn">Deze maand</button>

      <span class="text-gray-700 text-xs hidden sm:block">|</span>

      <!-- Jaar navigator -->
      <div class="flex items-center gap-1">
        <button id="year-prev" onclick="navYear(-1)"
          class="w-6 h-6 flex items-center justify-center rounded bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-400 hover:text-white transition disabled:opacity-30 disabled:cursor-not-allowed text-sm">
          ‹
        </button>
        <select id="year-select" onchange="setYearFromSelect()"
          class="bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm text-white focus:outline-none focus:border-snap-yellow">
          <option value="">Alle jaren</option>
        </select>
        <button id="year-next" onclick="navYear(1)"
          class="w-6 h-6 flex items-center justify-center rounded bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-400 hover:text-white transition disabled:opacity-30 disabled:cursor-not-allowed text-sm">
          ›
        </button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Grid panel -->
    <div id="grid-panel" class="flex-1 overflow-y-auto p-3">
      <div id="grid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 gap-1.5">
      </div>
      <div id="loading" class="text-center py-8 text-gray-500 hidden">
        <svg class="animate-spin w-6 h-6 mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10" stroke-width="4" class="opacity-25"/><path d="M4 12a8 8 0 018-8" stroke-width="4" class="opacity-75"/></svg>
      </div>
      <div id="empty" class="text-center py-16 text-gray-500 hidden">
        <p class="text-lg">Geen herinneringen gevonden</p>
        <p class="text-sm mt-1">Pas de filters aan om meer te zien</p>
      </div>
      <div id="sentinel" class="h-4"></div>
    </div>

    <!-- Map panel (hidden by default) -->
    <div id="map-panel" class="hidden w-full md:w-1/2 lg:w-2/5 border-l border-gray-800 flex-none">
      <div id="map" class="h-full"></div>
    </div>
  </div>

  <!-- ===== LIGHTBOX ===== -->
  <div id="lightbox" class="fixed inset-0 z-50 hidden bg-black/95 flex flex-col">
    <!-- Top bar -->
    <div class="flex-none flex items-center justify-between px-4 py-3 bg-black/50">
      <div id="lb-info" class="text-sm text-gray-300"></div>
      <div class="flex items-center gap-2">
        <a id="lb-download" href="#" download
          class="text-gray-400 hover:text-white p-1 rounded transition" title="Downloaden">
          <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        </a>
        <button onclick="closeLightbox()" class="text-gray-400 hover:text-white p-1 rounded transition">
          <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>
    <!-- Media -->
    <div class="flex-1 flex items-center justify-center overflow-hidden p-4">
      <div id="lb-content" class="max-w-full max-h-full"></div>
    </div>
    <!-- Nav arrows -->
    <button id="lb-prev" onclick="lightboxNav(-1)"
      class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 rounded-full p-2 transition">
      <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>
    <button id="lb-next" onclick="lightboxNav(1)"
      class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-black/80 rounded-full p-2 transition">
      <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="/static/app.js"></script>
  <script>window.MEDIA_BASE = "{{ media_base }}";</script>
</body>
</html>
