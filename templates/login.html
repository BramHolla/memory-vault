<!DOCTYPE html>
<html lang="nl" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inloggen — Herinneringen</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { snap: { yellow: '#FFFC00' } } } }
    }
  </script>
</head>
<body class="dark h-full bg-gray-950 text-white flex items-center justify-center">
  <div class="w-full max-w-sm bg-gray-900 rounded-xl p-8 border border-gray-800 shadow-2xl">

    <!-- Logo -->
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-full bg-snap-yellow flex items-center justify-center flex-none">
        <svg viewBox="0 0 24 24" class="w-6 h-6 fill-black">
          <path d="M12.166 3c-3.837 0-6.43 2.917-6.43 6.43 0 .604.07 1.186.186 1.742-.27.143-.553.22-.857.22-.44 0-.846-.174-1.15-.46l-.002-.001c-.13-.128-.32-.097-.417.065-.1.167-.053.387.107.493.523.346.87.927.87 1.59 0 .21-.034.412-.097.603-.27.816-.934 1.43-1.762 1.649-.193.05-.33.23-.304.428.026.198.2.342.4.342.017 0 .035 0 .053-.003.28-.04.56-.06.838-.06.56 0 1.05.107 1.45.317.77.41 1.21 1.19 1.37 2.32.025.187.187.325.375.325h.043c.228-.02.453-.03.67-.03.507 0 .99.07 1.437.207.64.196 1.246.583 1.76 1.12.434.46.827.682 1.266.682.44 0 .832-.222 1.267-.683.514-.537 1.12-.924 1.76-1.12.447-.137.93-.207 1.437-.207.217 0 .442.01.67.03h.043c.188 0 .35-.138.375-.325.16-1.13.6-1.91 1.37-2.32.4-.21.89-.317 1.45-.317.278 0 .558.02.838.06.018.003.036.003.053.003.2 0 .374-.144.4-.342.026-.198-.11-.378-.304-.428-.828-.22-1.493-.833-1.762-1.649-.063-.19-.097-.393-.097-.603 0-.663.347-1.244.87-1.59.16-.106.207-.326.107-.493-.097-.162-.287-.193-.417-.065l-.002.001c-.304.286-.71.46-1.15.46-.304 0-.587-.077-.857-.22.116-.556.186-1.138.186-1.742C18.596 5.917 16.003 3 12.166 3z"/>
        </svg>
      </div>
      <h1 class="text-xl font-bold text-snap-yellow">Herinneringen</h1>
    </div>

    {% if error %}
      <p class="text-red-400 text-sm mb-4 bg-red-950/50 border border-red-800 rounded-lg px-3 py-2">
        {{ error }}
      </p>
    {% endif %}

    <form method="POST">
      <label class="block text-sm text-gray-400 mb-1.5">E-mailadres</label>
      <input type="email" name="email" autofocus autocomplete="email"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white
               focus:outline-none focus:border-snap-yellow focus:ring-1 focus:ring-snap-yellow
               placeholder-gray-600 mb-4"
        placeholder="naam@voorbeeld.nl">

      <label class="block text-sm text-gray-400 mb-1.5">Wachtwoord</label>
      <input type="password" name="password" autocomplete="current-password"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white
               focus:outline-none focus:border-snap-yellow focus:ring-1 focus:ring-snap-yellow
               placeholder-gray-600 mb-4"
        placeholder="••••••••">

      <button type="submit"
        class="w-full bg-snap-yellow text-black font-semibold rounded-lg py-2.5
               hover:bg-yellow-300 active:scale-95 transition">
        Inloggen
      </button>
    </form>

  </div>
</body>
</html>
